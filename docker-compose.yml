networks:
  youtube-todo-app:
    name: youtube-todo-app

services:
  db:
    container_name: youtube-todo-app-db
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: youtube_todo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - youtube-todo-app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d youtube_todo"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: youtube-todo-app-backend
    build:
      context: ./backend
    environment:
      ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/youtube_todo
    ports:
      - "8000:8000"
    networks:
      - youtube-todo-app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
